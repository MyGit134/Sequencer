# Remote services bundle (run this on each managed machine)

version: "3.9"

services:
  reverse-ssh:
    build:
      context: ./ssh-tunnel
      dockerfile: Dockerfile
    container_name: rch-reverse-ssh
    env_file:
      - ./.env
    environment:
      - SSH_HOST=${SSH_HOST}
      - SSH_USER=${SSH_USER}
      - SSH_PASSWORD=${SSH_PASSWORD}
      - SSH_PORT=${SSH_PORT:-22}
      - LOCAL_HOST=${LOCAL_HOST:-127.0.0.1}
      - REMOTE_BIND_HOST=${REMOTE_BIND_HOST:-127.0.0.1}
      - TUNNEL_PORTS=${TUNNEL_PORTS:-6080:6080}
    volumes:
      - ./ssh:/ssh:ro
    network_mode: host
    restart: unless-stopped

  desktop:
    image: lscr.io/linuxserver/webtop:latest
    container_name: rch-webtop
    profiles: ["desktop-webtop"]
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    volumes:
      - ./webtop-config:/config
    ports:
      - "3000:3000"
    shm_size: "1gb"
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: rch-mediamtx
    profiles: ["camera"]
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
    restart: unless-stopped

  cam-video-publisher:
    image: linuxserver/ffmpeg:latest
    container_name: rch-ffmpeg-video
    profiles: ["camera"]
    depends_on:
      - mediamtx
    privileged: true
    volumes:
      - /dev:/dev
      - ./start-video.sh:/start-video.sh:ro
    entrypoint: ["/bin/sh", "/start-video.sh"]
    restart: unless-stopped

  mic-publisher:
    image: linuxserver/ffmpeg:latest
    container_name: rch-ffmpeg-audio
    profiles: ["camera"]
    depends_on:
      - mediamtx
    privileged: true
    volumes:
      - /dev:/dev
      - ./start-audio.sh:/start-audio.sh:ro
    entrypoint: ["/bin/sh", "/start-audio.sh"]
    restart: unless-stopped

  novnc:
    build:
      context: ./novnc
      dockerfile: Dockerfile
    container_name: rch-novnc
    profiles: ["desktop-real"]
    network_mode: host
    environment:
      - VNC_SERVER=127.0.0.1:5900
      - WEB_PORT=6080
    restart: unless-stopped
